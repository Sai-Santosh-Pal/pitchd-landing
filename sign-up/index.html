<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Sign Up</title>
</head>
<body class="bg-black m-0 p-0 w-full h-[100vh] text-white flex items-center justify-center" style="font-family: 'Inter Tight';">
    <div class="box w-[80%] h-[95%] border-[0.1px] max-w-[550px] py-15 px-10 border-[#0b0b0b]">
        <div class="text">
            <p class="font-black text-5xl">Sign Up</p>
            <p class="text-gray-400 mt-2 ">Lorem ipsum dolor sit amet consectetur adipisicing elit. Inventore, ea?</p>
        </div>
        <div class="mt-10 w-[100%] items-center flex flex-col justify-center">
            <form action="">
                <label for="name" class="w-[90%]">Name</label>
                <br>
                <input id="name" class="mb-4 mt-1 w-[70vw] max-w-[470px] outline-none border-[0.1px] border-[#0b0b0b] " type="text">
                <br>
                <label for="email">Email</label>
                <br>
                <input id="email" class="mb-4 mt-1 w-[70vw] max-w-[470px] outline-none border-[0.1px] border-[#0b0b0b] " type="email">
                <br>
                <label for="password">Password</label>
                <br>
                <input id="password" class="mb-4 mt-1 w-[70vw] max-w-[470px] outline-none border-[0.1px] border-[#0b0b0b] " type="password">
            </form>
            <button class="mt-5 bg-white text-black py-2 px-5">Submit</button>
        </div>
    </div>
</body>
</html>
